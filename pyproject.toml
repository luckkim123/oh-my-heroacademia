[project]
name = "omha"
version = "0.1.0"
description = "oh-my-heroacademia — meta-coordinator that routes requests across harnesses (superpowers/OMC/OMD) via A2A cards"
requires-python = ">=3.11"
dependencies = [
    "a2a-sdk>=0.3,<0.4",
    "fastapi",
    "uvicorn",
]

[project.optional-dependencies]
dev = ["pytest", "httpx"]

[project.scripts]
omha = "omha.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["src"]
